<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#09090b"/>
  <!-- Teal I beam — the ILLUCEO brand mark -->
  <rect x="12" y="5" width="8" height="2.5" rx="1" fill="#00e5b0"/>
  <rect x="14.75" y="7.5" width="2.5" height="12" rx="1" fill="#00e5b0"/>
  <rect x="12" y="19.5" width="8" height="2.5" rx="1" fill="#00e5b0"/>
  <!-- Light beam dropping down -->
  <rect x="15.25" y="22" width="1.5" height="5" rx="0.75" fill="url(#beam)"/>
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5b0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00e5b0" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
