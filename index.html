<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ILLUCEO — The moment AI becomes clear. Daily AI intelligence in 8 languages.">
<title>ILLUCEO — The Moment AI Becomes Clear</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090b; --bg2:#0f0f12; --bg3:#141418;
  --border:#1e1e24; --border2:#2a2a34;
  --text:#ede9e0; --text2:#8a8680; --text3:#484540;
  --teal:#00e5b0; --teal-dim:rgba(0,229,176,0.07); --teal-glow:rgba(0,229,176,0.14);
  --amber:#f5a623; --blue:#4a90d9; --rose:#e05c6a; --violet:#9b7fe8; --nord:#4687ff;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
  --sans:'Outfit',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:200;background:rgba(9,9,11,0.93);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 32px;height:40px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:20px;}
.live-pill{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--teal);}
.live-dot{width:5px;height:5px;background:var(--teal);border-radius:50%;animation:livepulse 2s ease-in-out infinite;}
@keyframes livepulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.topbar-date{font-family:var(--mono);font-size:9px;color:var(--text3);}
.lang-switcher{display:flex;gap:2px;}
.lang-btn{font-family:var(--mono);font-size:8px;padding:2px 6px;border:1px solid transparent;background:transparent;color:var(--text3);cursor:pointer;}
.lang-btn.active{color:var(--teal);border-color:var(--teal);background:var(--teal-dim);}
.nord-strip{background:linear-gradient(90deg,#0d1428,#111c3a);border-bottom:1px solid #1a2d52;padding:7px 32px;display:flex;align-items:center;justify-content:space-between;}
.nord-text{font-family:var(--mono);font-size:10px;color:#7ba8e8;}
.nord-cta{background:linear-gradient(135deg,#4687ff,#2654c8);color:#fff;font-family:var(--mono);font-size:9px;padding:5px 14px;border-radius:3px;text-decoration:none;}
.masthead{text-align:center;padding:52px 32px 36px;border-bottom:1px solid var(--border);}
.site-name{font-family:var(--serif);font-size:clamp(68px,13vw,140px);font-weight:700;color:var(--text);}
.site-name .ib{color:var(--teal);}
.site-tagline{font-family:var(--serif);font-style:italic;font-size:clamp(14px,2vw,20px);color:var(--text2);margin-top:22px;}
.nav{display:flex;justify-content:center;border-bottom:1px solid var(--border);}
.nav-item{font-family:var(--mono);font-size:9px;letter-spacing:.25em;padding:11px 18px;color:var(--text3);cursor:pointer;transition:all .18s;}
.nav-item.active{color:var(--teal);border-bottom:2px solid var(--teal);}
.main{max-width:1380px;margin:0 auto;padding:28px 20px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:52vh;gap:20px;}
.loading-logo{font-family:var(--serif);font-size:36px;color:var(--text3);animation:fadeloop 2s infinite;}
@keyframes fadeloop{0%,100%{opacity:.35;}50%{opacity:1;}}
.error-box{display:none;max-width:480px;margin:60px auto;background:rgba(224,92,106,.05);border:1px solid rgba(224,92,106,.2);padding:28px;text-align:center;}
.bento{display:none;animation:risein .5s ease forwards;}
@keyframes risein{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.hero-row{display:grid;grid-template-columns:1fr 320px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--border);gap:1px;}
.hero-main{background:var(--bg2);padding:36px 40px;}
.hero-sidebar{background:var(--bg2);display:flex;flex-direction:column;}
.sidebar-story{padding:18px 22px;border-bottom:1px solid var(--border);flex:1;}
.cat{font-family:var(--mono);font-size:8px;text-transform:uppercase;margin-bottom:9px;display:inline-flex;align-items:center;gap:5px;}
.cat-models{color:var(--teal);}.cat-tools{color:var(--amber);}.cat-business{color:#e8c46a;}
.hl-xl{font-family:var(--serif);font-size:clamp(26px,3.8vw,48px);font-weight:600;line-height:1.08;margin-bottom:14px;}
.deck{font-size:14px;line-height:1.75;color:var(--text2);margin-bottom:16px;}
.why-box{background:var(--teal-dim);border-left:2px solid var(--teal);padding:9px 13px;margin-bottom:16px;}
.why-label{font-family:var(--mono);font-size:7px;color:var(--teal);margin-bottom:3px;}
.meta{font-family:var(--mono);font-size:9px;color:var(--text3);display:flex;gap:10px;}
.card-row,.row2,.bottom-row{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);background:var(--border);gap:1px;margin-top:20px;}
.card{background:var(--bg2);padding:22px 26px;}
footer{border-top:1px solid var(--border);padding:36px 32px;display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:32px;margin-top:24px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="live-pill"><div class="live-dot"></div><span data-i18n="live">LIVE</span></div>
    <div class="topbar-date" id="topbar-date"></div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="de">DE</button>
    <button class="lang-btn" data-lang="pt">PT</button>
  </div>
</div>

<header class="masthead">
  <div class="site-name"><span class="ib">I</span>LLUCEO</div>
  <div class="site-tagline" data-i18n="tagline">The moment AI becomes clear</div>
</header>

<nav class="nav">
  <div class="nav-item active" data-cat="all" data-i18n="nav_all">All Stories</div>
  <div class="nav-item" data-cat="models">Models</div>
  <div class="nav-item" data-cat="tools">Tools</div>
  <div class="nav-item" data-cat="business">Business</div>
</nav>

<main class="main">
  <div class="loading" id="loading">
    <div class="loading-logo"><span>I</span>LLUCEO</div>
    <div class="loading-msg">Illuminating today's AI landscape</div>
  </div>
  <div class="error-box" id="error-box">
    <h3>Connection Lost</h3>
    <p id="error-msg"></p>
  </div>
  <div class="bento" id="bento">
    <div class="hero-row" id="hero-row"></div>
    <div class="card-row" id="card-row"></div>
    <div class="row2" id="row2"></div>
    <div class="bottom-row" id="bottom-row"></div>
  </div>
</main>

<script>
const CAT={'Models':'cat-models','Tools':'cat-tools','Business':'cat-business','Research':'cat-research','Policy':'cat-policy','Agents':'cat-agents'};
let lang='en', currentCat='all', allArticles=[];

function catDot(cat){return `<div class="cat ${CAT[cat]||'cat-models'}">${cat}</div>`;}

function render(articles){
  const items = (currentCat==='all' ? articles : articles.filter(a => a.category.toLowerCase() === currentCat));
  if(!items.length) return;

  const h = items[0];
  document.getElementById('hero-row').innerHTML = `
    <div class="hero-main">
      ${catDot(h.category)}
      <div class="hl-xl">${h.headline}</div>
      <div class="deck">${h.summary}</div>
      <div class="why-box"><div class="why-label">WHY IT MATTERS</div><div class="why-text">${h.why_matters}</div></div>
      <div class="meta"><span>⏱ ${h.read_time} min read</span></div>
    </div>
    <div class="hero-sidebar">
      ${items.slice(1,4).map(a => `<div class="sidebar-story">${catDot(a.category)}<div>${a.headline}</div></div>`).join('')}
    </div>`;

  document.getElementById('card-row').innerHTML = items.slice(4,7).map(a => `
    <div class="card">${catDot(a.category)}<div>${a.headline}</div></div>`).join('');

  document.getElementById('loading').style.display='none';
  document.getElementById('bento').style.display='block';
  document.getElementById('bento').classList.add('visible');
}

async function fetchNews(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('error-box').style.display='none';
  try {
    // FIXED: Fetching local file instead of external API
    const res = await fetch('./news-data.json');
    if(!res.ok) throw new Error("News data not found. Please wait for the daily update.");
    const data = await res.json();
    allArticles = data.articles;
    render(allArticles);
  } catch(err) {
    document.getElementById('loading').style.display='none';
    document.getElementById('error-box').style.display='block';
    document.getElementById('error-msg').textContent = err.message;
  }
}

fetchNews();
</script>
</body>
</html>
