<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ILLUCEO — The moment AI becomes clear. Daily AI intelligence in 8 languages.">
<meta property="og:title" content="ILLUCEO — AI Intelligence Daily">
<meta property="og:url" content="https://illuceo.space">
<link rel="canonical" href="https://illuceo.space">
<title>ILLUCEO — The Moment AI Becomes Clear</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/shell.css">
<style>
.masthead{text-align:center;padding:52px 32px 36px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.masthead::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:700px;height:280px;background:radial-gradient(ellipse,rgba(0,229,176,.055) 0%,transparent 68%);pointer-events:none;}
.site-name{font-family:var(--serif);font-size:clamp(68px,13vw,140px);font-weight:700;letter-spacing:.12em;line-height:.88;color:var(--text);display:inline-block;text-decoration:none;}
.site-name .ib{color:var(--teal);position:relative;display:inline-block;}
.site-name .ib::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:2px;height:36px;background:linear-gradient(to bottom,var(--teal),transparent);animation:beam 3s ease-in-out infinite;}
@keyframes beam{0%,100%{opacity:.5;height:28px;}50%{opacity:1;height:40px;}}
.site-tagline{font-family:var(--serif);font-style:italic;font-size:clamp(14px,2vw,20px);color:var(--text2);margin-top:22px;letter-spacing:.04em;}
.latin-note{font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--text3);margin-top:10px;opacity:.55;}

/* TICKER */
.ticker-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:20px;display:flex;align-items:stretch;}
.ticker-label{background:var(--teal);color:var(--bg);font-family:var(--mono);font-size:8px;letter-spacing:.3em;text-transform:uppercase;font-weight:500;padding:0 16px;display:flex;align-items:center;flex-shrink:0;}
.ticker-overflow{overflow:hidden;flex:1;padding:10px 0;}
.ticker-track{display:flex;animation:ticker 60s linear infinite;white-space:nowrap;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.ticker-item{font-family:var(--mono);font-size:10px;color:var(--text2);padding:0 28px;letter-spacing:.04em;white-space:nowrap;cursor:pointer;transition:color .15s;}
.ticker-item:hover{color:var(--teal);}
.ticker-item::after{content:'·';margin-left:28px;color:var(--border2);}

/* BENTO */
.hero-top{border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:1px;cursor:pointer;background:var(--bg2);position:relative;padding:36px 40px;transition:background .2s;}
.hero-top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),transparent);transform:scaleX(0);transform-origin:left;transition:transform .35s;}
.hero-top:hover{background:#101013;}
.hero-top:hover::before{transform:scaleX(1);}
.hero-top:hover .hl-xl{color:var(--teal);}
.hero-row{display:grid;grid-template-columns:1fr 300px;border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;overflow:hidden;background:var(--border);gap:1px;margin-bottom:1px;}
.hero-main{background:var(--bg2);padding:28px 32px;cursor:pointer;position:relative;transition:background .2s;}
.hero-main:hover{background:#101013;}
.hero-main:hover .hl-xl{color:var(--teal);}
.hero-sidebar{background:var(--bg2);display:flex;flex-direction:column;border-left:1px solid var(--border);}
.sidebar-story{padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .18s;flex:1;}
.sidebar-story:last-child{border-bottom:none;}
.sidebar-story:hover{background:rgba(255,255,255,.018);}
.sidebar-story:hover .hl-sm{color:var(--teal);}
.hl-sm{font-family:var(--serif);font-size:15px;font-weight:600;line-height:1.28;color:var(--text);margin-bottom:6px;transition:color .2s;}
.deck-sm{font-size:12px;line-height:1.6;color:var(--text3);}
.card-row{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;background:var(--border);gap:1px;margin-bottom:20px;}
.row2{display:grid;grid-template-columns:1fr 1fr 260px;border:1px solid var(--border);border-radius:6px;background:var(--border);gap:1px;margin-bottom:20px;}
.bottom-row{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);border-radius:6px;background:var(--border);gap:1px;margin-bottom:20px;}
.card{background:var(--bg2);padding:22px 26px;cursor:pointer;transition:background .18s;}
.card:hover{background:#101013;}
.card:hover .hl-md{color:var(--teal);}
.hl-md{font-family:var(--serif);font-size:19px;font-weight:600;line-height:1.22;color:var(--text);margin-bottom:8px;transition:color .2s;}
.deck-card{font-size:12px;line-height:1.65;color:var(--text3);margin-bottom:10px;}
.read-hint{font-family:var(--mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);opacity:0;transition:opacity .18s;margin-top:8px;}
.card:hover .read-hint,.hero-main:hover .read-hint,.sidebar-story:hover .read-hint{opacity:1;}
.nord-card{background:linear-gradient(145deg,#0a1530,#0d1e45);padding:26px 24px;border-left:1px solid #1a2d52;display:flex;flex-direction:column;justify-content:space-between;gap:14px;}
.nord-card-badge{font-family:var(--mono);font-size:7px;letter-spacing:.3em;text-transform:uppercase;color:var(--nord);margin-bottom:2px;}
.nord-card-title{font-family:var(--serif);font-size:18px;font-weight:600;color:#e8f0ff;line-height:1.3;margin-bottom:8px;}
.nord-card-body{font-size:11px;color:#6b96d4;line-height:1.65;flex:1;}
.nord-card-btn{display:block;text-align:center;background:linear-gradient(135deg,#4687ff,#2654c8);color:#fff;font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:10px 14px;border-radius:3px;text-decoration:none;transition:all .2s;}
.nord-card-btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(70,135,255,.3);}
.nord-card-fine{font-family:var(--mono);font-size:7px;color:#2a4060;text-align:center;letter-spacing:.1em;margin-top:4px;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:52vh;gap:20px;}
.loading-logo{font-family:var(--serif);font-size:36px;font-weight:600;letter-spacing:.2em;color:var(--text3);animation:fadeloop 2s ease-in-out infinite;}
.loading-logo span{color:var(--teal);}
@keyframes fadeloop{0%,100%{opacity:.35;}50%{opacity:1;}}
.loading-bar{width:120px;height:1px;background:var(--border2);position:relative;overflow:hidden;}
.loading-bar::after{content:'';position:absolute;left:-40%;top:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--teal),transparent);animation:scan 1.4s ease-in-out infinite;}
@keyframes scan{0%{left:-40%;}100%{left:100%;}}
.loading-msg{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--text3);}
.error-box{display:none;max-width:480px;margin:60px auto;background:rgba(224,92,106,.05);border:1px solid rgba(224,92,106,.2);border-radius:4px;padding:28px;text-align:center;}
.error-box h3{font-family:var(--serif);font-size:24px;color:var(--rose);margin-bottom:10px;}
.error-box p{font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.7;}
.bento{display:none;animation:risein .5s ease forwards;}
.bento.visible{display:block;}
@keyframes risein{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0);backdrop-filter:blur(0px);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;pointer-events:none;transition:background .3s,backdrop-filter .3s;overflow:hidden;}
.modal-overlay.open{background:rgba(0,0,0,.8);backdrop-filter:blur(10px);pointer-events:all;}
.modal-panel{width:100%;max-width:780px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow-y:auto;overflow-x:hidden;transform:translateY(32px);opacity:0;transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .3s;margin:auto;position:relative;max-height:90vh;}
.modal-overlay.open .modal-panel{transform:translateY(0);opacity:1;}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;font-family:var(--mono);font-size:14px;color:var(--text3);transition:all .18s;}
.modal-close:hover{border-color:var(--teal);color:var(--teal);}
.modal-header{padding:36px 44px 28px;border-bottom:1px solid var(--border);}
.modal-body{padding:32px 44px 44px;}
.article-content{font-size:15px;line-height:1.85;color:var(--text2);}
.article-content h2{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--text);margin:28px 0 12px;}
.article-content p{margin-bottom:16px;}
.article-content ul,.article-content ol{padding-left:22px;margin-bottom:16px;}
.article-content li{margin-bottom:7px;}
.article-content strong{color:var(--text);font-weight:500;}
.key-facts{background:var(--bg3);border:1px solid var(--border2);border-left:2px solid var(--teal);border-radius:0 4px 4px 0;padding:18px 22px;margin:24px 0;}
.key-facts-title{font-family:var(--mono);font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);margin-bottom:12px;}
.key-facts ul{list-style:none;padding:0;}
.key-facts li{font-size:13px;color:var(--text2);padding:7px 0;border-bottom:1px solid var(--border);line-height:1.5;}
.key-facts li:last-child{border-bottom:none;}
.key-facts li::before{content:'→ ';color:var(--teal);}
.modal-footer{padding:20px 44px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.modal-footer-meta{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;}
.modal-share{display:flex;gap:8px;}
.share-btn{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:3px;cursor:pointer;transition:all .18s;background:transparent;border:1px solid var(--border2);color:var(--text3);text-decoration:none;display:inline-block;}
.share-btn:hover{border-color:var(--teal);color:var(--teal);}
.share-btn.copied{border-color:var(--teal);color:var(--teal);background:var(--teal-dim);}
.modal-nord{background:linear-gradient(135deg,#0a1530,#0d1e45);border:1px solid #1a2d52;border-radius:4px;padding:16px 20px;margin:24px 0;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.modal-nord p{font-size:12px;color:#7ba8e8;flex:1;line-height:1.5;}
.modal-nord p strong{color:#c8deff;}
.modal-nord a{flex-shrink:0;background:linear-gradient(135deg,#4687ff,#2654c8);color:#fff;font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:8px 16px;border-radius:3px;text-decoration:none;transition:all .2s;white-space:nowrap;}
.modal-nord a:hover{transform:translateY(-1px);}
.modal-loading{padding:60px 40px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;}

/* RESPONSIVE */
@media(max-width:1100px){.row2{grid-template-columns:1fr 1fr;}.nord-card{grid-column:span 2;flex-direction:row;align-items:center;}}
@media(max-width:900px){.hero-top{padding:24px 20px;}.hero-row{grid-template-columns:1fr;}.hero-sidebar{flex-direction:row;flex-wrap:wrap;border-left:none;border-top:1px solid var(--border);}.sidebar-story{min-width:160px;flex:1;border-bottom:none;border-right:1px solid var(--border);}.sidebar-story:last-child{border-right:none;}.card-row{grid-template-columns:1fr 1fr;}.bottom-row{grid-template-columns:1fr 1fr;}}
@media(max-width:640px){
  .masthead{padding:32px 16px 24px;}
  .hero-main{padding:22px 18px;}
  .card-row,.row2,.bottom-row{grid-template-columns:1fr;}
  .nord-card{grid-column:1;flex-direction:column;}
  .modal-header,.modal-body,.modal-footer{padding-left:20px;padding-right:20px;}
}
</style>
</head>
<body>
<div id="shell-top"></div>

<header class="masthead">
  <a href="/" class="site-name notranslate" translate="no"><span class="ib">I</span>LLUCEO</a>
  <div class="site-tagline">The moment AI becomes clear</div>
  <div class="latin-note notranslate" translate="no">illuceo · latin · "to begin giving light · to dawn upon the mind"</div>
</header>

<nav id="shell-nav"></nav>

<main class="main">
  <div class="loading" id="loading">
    <div class="loading-logo"><span>I</span>LLUCEO</div>
    <div class="loading-bar"></div>
    <div class="loading-msg">Illuminating today's AI landscape</div>
  </div>
  <div class="error-box" id="error-box"><h3>Connection Lost</h3><p id="error-msg"></p></div>
  <div class="bento" id="bento">
    <div class="ticker-wrap">
      <div class="ticker-label">LIVE</div>
      <div class="ticker-overflow"><div class="ticker-track" id="ticker-track"></div></div>
    </div>
    <div class="section-hd"><span>Top Story</span><hr></div>
    <div class="hero-top" id="hero-top"></div>
    <div class="hero-row" id="hero-row"></div>
    <div class="card-row" id="card-row"></div>
    <div class="section-hd" style="margin-top:18px"><span>Latest Intelligence</span><hr></div>
    <div class="row2" id="row2"></div>
    <div class="section-hd" style="margin-top:18px"><span>Quick Briefing</span><hr></div>
    <div class="bottom-row" id="bottom-row"></div>
  </div>
</main>

<!-- ARTICLE MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-panel" id="modal-panel">
    <div class="modal-close" id="modal-close">✕</div>
    <div id="modal-content"></div>
  </div>
</div>

<div id="shell-bottom"></div>
<script src="/assets/shell.js"></script>
<script>
const NORDVPN = 'https://go.nordvpn.net/aff_c?offer_id=15&aff_id=145247&url_id=902';
const CAT = {Models:'cat-models',Tools:'cat-tools',Business:'cat-business',Research:'cat-research',Policy:'cat-policy',Agents:'cat-agents'};
let allArticles = [];

function catDot(cat){ return `<div class="cat ${CAT[cat]||'cat-models'}">${cat||'AI'}</div>`; }
function dateStr(){ return new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}); }

/* ── MODAL — purely from pre-baked news-data.json, NO API calls ── */
const overlay  = document.getElementById('modal-overlay');
const closeBtn = document.getElementById('modal-close');
const modalContent = document.getElementById('modal-content');

function openArticle(article) {
  renderModal(article);
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal-panel').scrollTop = 0;
  const slug = (article.headline||'article').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,60);
  history.pushState(null, '', '#' + slug);
}

function renderModal(article) {
  const hasFull = article.lede && article.sections && article.sections.length;

  if (hasFull) {
    /* Full pre-baked article from news-data.json */
    const sections = article.sections.map(s =>
      `<h2>${s.heading}</h2>${s.body.split('\n\n').map(p=>`<p>${p.trim()}</p>`).join('')}`
    ).join('');
    const takeaways = (article.takeaways||[]).map(t=>`<li>${t}</li>`).join('');

    modalContent.innerHTML = `
      <div class="modal-header">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;">
          ${catDot(article.category)}
          <span style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;">${dateStr()} · ${article.read_time||5} min read</span>
        </div>
        <div class="hl-xl" style="margin-bottom:14px;">${article.headline}</div>
        <div class="deck">${article.lede}</div>
      </div>
      <div class="modal-body">
        <div class="article-content">
          ${sections}
          ${takeaways ? `<div class="key-facts"><div class="key-facts-title">Key Takeaways</div><ul>${takeaways}</ul></div>` : ''}
          <p>${article.closing||''}</p>
        </div>
        <div class="modal-nord">
          <p>🛡️ <strong>Stay private while reading AI news.</strong> NordVPN encrypts your connection.</p>
          <a href="${NORDVPN}" target="_blank" rel="noopener sponsored">Get 73% OFF →</a>
        </div>
        <div class="why-box">
          <div class="why-label">Why This Matters</div>
          <div class="why-text">${article.why_matters||article.summary}</div>
        </div>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-meta">ILLUCEO · ${dateStr()} · ${article.category||'AI'}</div>
        <div class="modal-share">
          <button class="share-btn" id="share-copy">Copy Link</button>
          <a class="share-btn" href="https://twitter.com/intent/tweet?text=${encodeURIComponent((article.headline||'')+'  illuceo.space')}" target="_blank" rel="noopener">Post →</a>
        </div>
      </div>`;

  } else {
    /* Fallback: summary-only (older news-data.json without full articles) */
    const body = article.summary || '';
    const wm   = article.why_matters || '';
    modalContent.innerHTML = `
      <div class="modal-header">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
          ${catDot(article.category)}
          <span style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;">${dateStr()} · ${article.read_time||5} min read</span>
        </div>
        <div class="hl-xl" style="margin-bottom:14px;">${article.headline}</div>
        <div class="deck">${body}</div>
      </div>
      <div class="modal-body">
        ${wm ? `<div class="why-box"><div class="why-label">Why This Matters</div><div class="why-text">${wm}</div></div>` : ''}
        <div class="modal-nord">
          <p>🛡️ <strong>Stay private while reading AI news.</strong> NordVPN encrypts your connection.</p>
          <a href="${NORDVPN}" target="_blank" rel="noopener sponsored">Get 73% OFF →</a>
        </div>
        <p style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:20px;">
          Full article available after the next daily update.
        </p>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-meta">ILLUCEO · ${dateStr()}</div>
        <div class="modal-share"><button class="share-btn" id="share-copy">Copy Link</button></div>
      </div>`;
  }

  document.getElementById('share-copy')?.addEventListener('click', function(){
    navigator.clipboard.writeText(window.location.href).then(()=>{
      this.textContent='Copied!'; this.classList.add('copied');
      setTimeout(()=>{this.textContent='Copy Link';this.classList.remove('copied');},2000);
    });
  });
}

function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  history.pushState(null,'',window.location.pathname);
}
closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* ── BENTO RENDER ── */
function render(articles){
  const items = articles.length ? articles : [];
  if(!items.length) return;

  /* Ticker */
  document.getElementById('ticker-track').innerHTML =
    [...items,...items].map((a,i)=>
      `<div class="ticker-item" data-idx="${i%items.length}">⚡ ${a.headline}</div>`
    ).join('');
  document.querySelectorAll('.ticker-item').forEach(el=>
    el.addEventListener('click',()=>openArticle(items[+el.dataset.idx]))
  );

  /* Hero — top story full width, then second story + sidebar below */
  const h = items[0];
  const h2 = items[1];

  // Top story — full width
  document.getElementById('hero-top').setAttribute('data-idx','0');
  document.getElementById('hero-top').innerHTML = `
    ${catDot(h.category)}
    <div class="hl-xl" style="margin-bottom:14px;">${h.headline}</div>
    <div class="deck">${h.summary}</div>
    <div class="why-box"><div class="why-label">WHY IT MATTERS</div><div class="why-text">${h.why_matters||h.summary}</div></div>
    <div class="meta"><span class="readbadge">⏱ ${h.read_time||5} min read</span><span>${dateStr()}</span></div>
    <div class="read-hint">Read full story →</div>`;

  // Second story left + sidebar stories right
  const sidebarItems = items.slice(2,5);
  const sidebarHTML = sidebarItems.length ? `
    <div class="hero-sidebar">
      ${sidebarItems.map((a,i)=>`
        <div class="sidebar-story" data-idx="${i+2}">
          ${catDot(a.category)}<div class="hl-sm">${a.headline}</div>
          <div class="deck-sm">${a.summary}</div>
          <div class="meta" style="margin-top:8px"><span>${a.read_time||5} min read</span></div>
          <div class="read-hint">Read full story →</div>
        </div>`).join('')}
    </div>` : '';

  document.getElementById('hero-row').innerHTML = h2 ? `
    <div class="hero-main" data-idx="1">
      ${catDot(h2.category)}
      <div class="hl-xl" style="font-size:clamp(22px,2.8vw,34px);margin-bottom:12px;">${h2.headline}</div>
      <div class="deck">${h2.summary}</div>
      <div class="why-box"><div class="why-label">WHY IT MATTERS</div><div class="why-text">${h2.why_matters||h2.summary}</div></div>
      <div class="meta"><span class="readbadge">⏱ ${h2.read_time||5} min read</span><span>${dateStr()}</span></div>
      <div class="read-hint">Read full story →</div>
    </div>
    ${sidebarHTML}` : '';

  /* Cards 4-6 */
  document.getElementById('card-row').innerHTML = items.slice(5,8).map((a,i)=>`
    <div class="card" data-idx="${i+5}">${catDot(a.category)}
    <div class="hl-md">${a.headline}</div>
    <div class="deck-card">${a.summary}</div>
    <div class="meta"><span>${a.read_time||5} min read</span></div>
    <div class="read-hint">Read full story →</div></div>`).join('');

  /* Row2: 7-8 + nord */
  document.getElementById('row2').innerHTML =
    items.slice(8,10).map((a,i)=>`
      <div class="card" data-idx="${i+8}">${catDot(a.category)}
      <div class="hl-md">${a.headline}</div>
      <div class="deck-card">${a.summary}</div>
      <div class="why-box"><div class="why-label">WHY IT MATTERS</div><div class="why-text">${a.why_matters||a.summary}</div></div>
      <div class="meta"><span>${a.read_time||5} min read</span></div>
      <div class="read-hint">Read full story →</div></div>`).join('') +
    `<div class="nord-card">
      <div><div class="nord-card-badge">SPONSORED · PARTNER</div>
      <div class="nord-card-title">Read AI news privately — 73% OFF NordVPN</div>
      <div class="nord-card-body">Every site you visit is tracked. NordVPN encrypts your connection. Trusted by 14M+ users worldwide.</div></div>
      <div><a href="${NORDVPN}" target="_blank" rel="noopener sponsored" class="nord-card-btn">Claim Your Discount →</a>
      <div class="nord-card-fine">30-day money-back guarantee</div></div>
    </div>`;

  /* Bottom 9-12 */
  document.getElementById('bottom-row').innerHTML = items.slice(10,14).map((a,i)=>`
    <div class="card" data-idx="${i+10}">${catDot(a.category)}
    <div class="hl-md">${a.headline}</div>
    <div class="deck-card">${a.summary}</div>
    <div class="meta"><span>${a.read_time||5} min read</span></div>
    <div class="read-hint">Read full story →</div></div>`).join('');

  /* Wire ALL data-idx clicks */
  document.querySelectorAll('[data-idx]').forEach(el=>
    el.addEventListener('click',()=>openArticle(items[+el.dataset.idx]))
  );

  document.getElementById('loading').style.display = 'none';
  document.getElementById('bento').classList.add('visible');
}

/* ── FETCH — static JSON only, no API ── */
async function fetchNews(){
  try {
    const res = await fetch('/news-data.json');
    if(!res.ok) throw new Error(`Could not load news (${res.status})`);
    const data = await res.json();
    allArticles = data.articles || [];
    render(allArticles);
  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-msg').textContent = err.message;
  }
}

fetchNews();
</script>
</body>
</html>
