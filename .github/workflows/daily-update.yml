name: ILLUCEO Daily News Update

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC daily
  workflow_dispatch:      # Manual trigger from GitHub Actions tab

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate full ILLUCEO articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import anthropic
          import json
          import re
          import time
          from datetime import datetime

          client = anthropic.Anthropic()
          today = datetime.utcnow().strftime("%B %d, %Y")

          print(f"🚀 ILLUCEO daily generation starting — {today}")

          # ── STEP 1: Generate 12 story briefs ──────────────────────────
          brief_prompt = f"""You are the editor of ILLUCEO at illuceo.space. Today is {today}.

          Generate exactly 12 of the most important AI news stories from the last 24 hours.
          Cover a diverse mix: Models, Tools, Business, Research, Policy, Agents.
          Be specific — real companies, real products, real developments.

          Return ONLY valid JSON array, no markdown, no preamble:
          [{{"headline":"...","category":"Models|Tools|Business|Research|Policy|Agents","summary":"2 sentence summary","why_matters":"1 sentence","read_time":3}}]"""

          msg = client.messages.create(
              model="claude-3-5-sonnet-20241022",
              max_tokens=2000,
              messages=[{"role": "user", "content": brief_prompt}]
          )
          raw = re.sub(r'```json|```', '', msg.content[0].text).strip()
          briefs = json.loads(raw)
          print(f"✅ Step 1: {len(briefs)} story briefs generated")
          time.sleep(2)

          # ── STEP 2: Expand each brief into a full article ──────────────
          def expand_article(brief, idx):
              prompt = f"""You are a journalist at ILLUCEO (illuceo.space), a premium AI news site. Today is {today}.

          Write a complete, in-depth news article about this story:

          HEADLINE: {brief['headline']}
          CATEGORY: {brief['category']}
          SUMMARY: {brief['summary']}
          WHY IT MATTERS: {brief['why_matters']}

          Write a thorough article of 500-700 words. Be specific, analytical and authoritative.

          Return ONLY valid JSON, no markdown:
          {{
            "lede": "Strong opening paragraph (2-3 sentences, the core news hook)",
            "sections": [
              {{"heading": "Descriptive H2 heading", "body": "2-3 paragraphs of analysis separated by \\n\\n"}},
              {{"heading": "Descriptive H2 heading", "body": "2-3 paragraphs"}},
              {{"heading": "What This Means for You", "body": "Practical implications paragraph"}}
            ],
            "takeaways": [
              "Specific key point 1",
              "Specific key point 2",
              "Specific key point 3",
              "Specific key point 4",
              "Specific key point 5"
            ],
            "closing": "Forward-looking closing paragraph"
          }}"""

              try:
                  msg = client.messages.create(
                      model="claude-sonnet-4-20250514",
                      max_tokens=1500,
                      messages=[{"role": "user", "content": prompt}]
                  )
                  raw = re.sub(r'```json|```', '', msg.content[0].text).strip()
                  article = json.loads(raw)
                  print(f"  ✅ Article {idx+1}/{len(briefs)}: {brief['headline'][:50]}…")
                  return article
              except Exception as e:
                  print(f"  ⚠️  Article {idx+1} fallback: {e}")
                  return {
                      "lede": brief['summary'],
                      "sections": [
                          {"heading": "Overview", "body": brief['summary']},
                          {"heading": "Why This Matters", "body": brief['why_matters']}
                      ],
                      "takeaways": [brief['why_matters']],
                      "closing": f"Stay tuned to ILLUCEO for continued coverage of {brief['category']} developments."
                  }

          print("📝 Step 2: Expanding all articles...")
          full_articles = []
          for i, brief in enumerate(briefs):
              article_data = expand_article(brief, i)
              full_articles.append({
                  "headline": brief["headline"],
                  "category": brief["category"],
                  "summary": brief["summary"],
                  "why_matters": brief["why_matters"],
                  "read_time": brief["read_time"],
                  "lede": article_data["lede"],
                  "sections": article_data["sections"],
                  "takeaways": article_data["takeaways"],
                  "closing": article_data["closing"],
              })
              if (i + 1) % 3 == 0:
                  time.sleep(1)

          print(f"✅ Step 2: All {len(full_articles)} articles expanded")

          # ── STEP 3: Write news-data.json ──────────────────────────────
          output = {
              "site": "ILLUCEO",
              "url": "https://illuceo.space",
              "generated_at": datetime.utcnow().isoformat() + "Z",
              "date": today,
              "article_count": len(full_articles),
              "articles": full_articles
          }

          with open('news-data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          size_kb = len(json.dumps(output)) / 1024
          print(f"✅ Step 3: news-data.json written ({size_kb:.1f} KB)")
          PYEOF

      - name: Commit and push
        run: |
          git config --local user.email "bot@illuceo.space"
          git config --local user.name "ILLUCEO Bot"
          git add news-data.json
          git diff --staged --quiet || git commit -m "⚡ ILLUCEO daily update — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push