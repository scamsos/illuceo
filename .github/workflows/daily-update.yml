name: ILLUCEO Daily News Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic
      - name: Generate ILLUCEO news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import anthropic, json, re
          from datetime import datetime
          client = anthropic.Anthropic()
          today = datetime.utcnow().strftime("%B %d, %Y")
          prompt = f"""You are the editor of ILLUCEO at illuceo.space. Today is {today}. Generate exactly 12 important AI news stories from the last 24 hours. For each: headline, category (Models/Tools/Business/Research/Policy/Agents), summary (2 sentences), why_matters (1 sentence), read_time (2-5). Return ONLY valid JSON array. Format: [{{"headline":"...","category":"...","summary":"...","why_matters":"...","read_time":3}}]"""
          msg = client.messages.create(model="claude-sonnet-4-20250514", max_tokens=1000, messages=[{"role":"user","content":prompt}])
          raw = re.sub(r'```json|```','',msg.content[0].text).strip()
          articles = json.loads(raw)
          with open('news-data.json','w',encoding='utf-8') as f:
              json.dump({"site":"ILLUCEO","url":"https://illuceo.space","generated_at":datetime.utcnow().isoformat()+"Z","date":today,"articles":articles},f,ensure_ascii=False,indent=2)
          print(f"✅ {len(articles)} articles generated for {today}")
          PYEOF
      - name: Commit
        run: |
          git config --local user.email "bot@illuceo.space"
          git config --local user.name "ILLUCEO Bot"
          git add news-data.json
          git diff --staged --quiet || git commit -m "⚡ Daily update $(date -u +'%Y-%m-%d')"
          git push
